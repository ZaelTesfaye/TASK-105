services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - SECRET_KEY=${SECRET_KEY:-change-me-for-production}
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - FERNET_KEY_PATH=/app/data/keys/secret.key
      - LOG_FILE=/app/data/logs/app.jsonl
      - ATTACHMENT_DIR=/app/data/attachments
      - JOBS_ENABLED=true
      - ENABLE_TLS=${ENABLE_TLS:-false}
      - PYTHONPATH=/app/backend
    volumes:
      # Mount the whole data directory (not individual files). If the host path
      # ./data/db.sqlite3 does not exist, Docker would create a *directory*
      # named db.sqlite3 and SQLite fails with "unable to open database file".
      - ./data:/app/data
    restart: unless-stopped
