[pytest]
# Run from repo root: python -m pytest
# Paths are relative to this file (repo/)
testpaths = backend/tests/unit backend/tests/api backend/tests/integration
addopts = --tb=short -q
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::pytest.PytestDeprecationWarning
    ignore::DeprecationWarning
    ignore:The configuration option "asyncio_default_fixture_loop_scope".*:pytest.PytestDeprecationWarning
    ignore:Skipped unsupported reflection of expression-based index:sqlalchemy.exc.SAWarning
